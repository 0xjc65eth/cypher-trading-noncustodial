<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1a2e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#00ff88" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#00ff88" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00ff88" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00ff88" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00ff88" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00ff88" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00ff88" stroke-width="1"/>
  </g>

  <!-- Voice orb (center) -->
  <circle cx="220" cy="315" r="120" fill="url(#orbGrad)" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="220" cy="315" r="80" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
  <circle cx="220" cy="315" r="60" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="60;70;60" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="315" r="40" fill="#00ff88" opacity="0.4" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="315" r="15" fill="#00d4ff" opacity="0.8" filter="url(#glow)">
    <animate attributeName="r" values="15;18;15" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Waveform lines -->
  <g opacity="0.3">
    <line x1="350" y1="270" x2="350" y2="270" stroke="#00ff88" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="350;380;350" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="370" y1="315" x2="370" y2="315" stroke="#00d4ff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="370;410;370" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="350" y1="360" x2="350" y2="360" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="350;390;350" dur="0.7s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Title -->
  <text x="420" y="260" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="56" font-weight="900" fill="url(#textGrad)" filter="url(#glow)">CYPHER</text>

  <!-- Subtitle -->
  <text x="420" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="600" fill="#e0e0e0">Voice-First Non-Custodial DeFi Trading</text>

  <!-- Tagline -->
  <text x="420" y="365" font-family="'SF Mono','Fira Code',monospace" font-size="18" fill="#00ff88" opacity="0.8">Say "Hey Cypher" — Trade on any DEX by voice</text>

  <!-- Badge row -->
  <g transform="translate(420, 400)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#00ff88" opacity="0.15"/>
    <text x="50" y="18" font-family="system-ui,sans-serif" font-size="11" fill="#00ff88" text-anchor="middle">🔒 Non-Custodial</text>

    <rect x="110" y="0" width="85" height="26" rx="13" fill="#00d4ff" opacity="0.15"/>
    <text x="152" y="18" font-family="system-ui,sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">⛓️ Multi-Chain</text>

    <rect x="205" y="0" width="75" height="26" rx="13" fill="#7b2ff7" opacity="0.15"/>
    <text x="242" y="18" font-family="system-ui,sans-serif" font-size="11" fill="#7b2ff7" text-anchor="middle">🎙️ Voice AI</text>

    <rect x="290" y="0" width="85" height="26" rx="13" fill="#ff6b35" opacity="0.15"/>
    <text x="332" y="18" font-family="system-ui,sans-serif" font-size="11" fill="#ff6b35" text-anchor="middle">📂 Open Source</text>
  </g>

  <!-- Tech stack row -->
  <g transform="translate(420, 445)">
    <text x="0" y="0" font-family="'SF Mono',monospace" font-size="12" fill="#888">OVOS • Electron • React • ethers.js • WalletConnect v2 • 1inch • Jupiter • GMX</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#000" opacity="0.3"/>
  <text x="600" y="613" font-family="'SF Mono',monospace" font-size="13" fill="#666" text-anchor="middle">github.com/0xjc65eth/cypher-trading-noncustodial</text>

  <!-- Decorative dots -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="2" fill="#00ff88"/>
    <circle cx="150" cy="80" r="1.5" fill="#00d4ff"/>
    <circle cx="1100" cy="50" r="2" fill="#7b2ff7"/>
    <circle cx="1150" cy="100" r="1.5" fill="#00ff88"/>
    <circle cx="1050" cy="550" r="2" fill="#00d4ff"/>
    <circle cx="100" cy="550" r="1.5" fill="#7b2ff7"/>
    <circle cx="700" cy="550" r="2" fill="#00ff88"/>
    <circle cx="850" cy="50" r="1.5" fill="#ff6b35"/>
  </g>
</svg>
